<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1>Improving Search Performance using Debounce Technique</h1>
    <div class="container">
        <div class="div-1">
            <h2>Without Debounce</h2>
            <input id="search-1" type="text" maxlength="20" autocomplete="off" placeholder="Search here">
            <p id="result-1">Search Results : </p>
        </div>
        <div class="div-2">
            <h2>With Debounce <span>(300ms)</span></h2>
            <input id="search-2" type="text" maxlength="20" autocomplete="off" placeholder="Search here">
            <p id="result-2">Search Results : </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
